<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Amoria Glow — Scanner Commande</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --p1: #FF79B3;
  --p2: #FF949C;
  --p3: #FFB082;
  --dark: #1E0F1B;
  --mid: #6B4359;
  --cream: #FFF8F4;
  --light: #FFF0F7;
  --fd: 'Cormorant Garamond', serif;
  --fb: 'DM Sans', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--fb);
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, var(--p1), var(--p3));
  padding: 20px 24px 18px;
  text-align: center;
  position: relative;
}
.header-logo {
  font-family: var(--fd);
  font-size: 1.5rem;
  color: #fff;
  font-weight: 400;
  letter-spacing: .08em;
}
.header-sub {
  font-size: .65rem;
  color: rgba(255,255,255,.85);
  letter-spacing: .2em;
  text-transform: uppercase;
  margin-top: 4px;
}

/* LOADING */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  gap: 16px;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid rgba(255,121,179,.2);
  border-top-color: var(--p1);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: .8rem;
  color: var(--mid);
  letter-spacing: .1em;
}

/* ERROR */
#error {
  display: none;
  margin: 32px 20px;
  background: #FFF0F7;
  border: 1.5px solid #FFCCE3;
  border-radius: 16px;
  padding: 28px 24px;
  text-align: center;
}
#error .err-icon { font-size: 2.5rem; margin-bottom: 12px; }
#error h3 { font-family: var(--fd); font-size: 1.4rem; color: var(--dark); margin-bottom: 8px; }
#error p { font-size: .78rem; color: var(--mid); line-height: 1.8; }

/* CARD */
#result {
  display: none;
  padding: 20px 16px 40px;
  animation: fadeUp .4s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ORDER ID BADGE */
.order-badge {
  background: linear-gradient(135deg, var(--p1), var(--p2));
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.order-badge-id {
  font-family: var(--fd);
  font-size: 2rem;
  color: #fff;
  font-weight: 600;
  letter-spacing: .04em;
}
.order-badge-label {
  font-size: .6rem;
  color: rgba(255,255,255,.8);
  text-transform: uppercase;
  letter-spacing: .18em;
  margin-bottom: 4px;
}

/* STATUT BADGE */
.statut-pill {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .08em;
}
.statut-pill.preparer { background: #FFF9C4; color: #7A6000; }
.statut-pill.cours { background: #B3E5FC; color: #01579B; }
.statut-pill.envoye { background: #C8E6C9; color: #1B5E20; }

/* INFO CARD */
.info-card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid rgba(255,121,179,.12);
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(255,121,179,.06);
}
.info-row {
  display: flex;
  align-items: flex-start;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,121,179,.08);
  gap: 14px;
}
.info-row:last-child { border-bottom: none; }
.info-icon {
  font-size: 1.1rem;
  flex-shrink: 0;
  margin-top: 1px;
}
.info-content { flex: 1; min-width: 0; }
.info-label {
  font-size: .6rem;
  text-transform: uppercase;
  letter-spacing: .16em;
  color: var(--p1);
  font-weight: 600;
  margin-bottom: 3px;
}
.info-value {
  font-size: .82rem;
  color: var(--dark);
  line-height: 1.6;
  word-break: break-word;
}

/* PRODUITS */
.produit-item {
  padding: 10px 0;
  border-bottom: 1px dashed rgba(255,121,179,.15);
  font-size: .8rem;
  color: var(--dark);
  line-height: 1.5;
}
.produit-item:last-child { border-bottom: none; padding-bottom: 0; }
.produit-name { font-weight: 500; }
.produit-ref { font-size: .7rem; color: var(--mid); }

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  font-size: .65rem;
  color: var(--mid);
  letter-spacing: .1em;
}
.btn-back {
  display: block;
  margin: 0 16px 16px;
  background: linear-gradient(135deg, var(--p1), var(--p3));
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 14px;
  font-family: var(--fb);
  font-size: .75rem;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">✨ Amoria Glow</div>
  <div class="header-sub">Scanner de commandes</div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Chargement de la commande…</div>
</div>

<div id="error">
  <div class="err-icon">🔍</div>
  <h3>Commande introuvable</h3>
  <p id="error-msg">Aucune commande ne correspond à cet identifiant.</p>
</div>

<div id="result"></div>

<script>
var CSV_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTkUQ3UTjLhTTVv29vl_dkOtjweQ41gkUJNgwDkxgb_6Y0OtGX-8FsP7ZeQzNmEykeKifIXI5o42_4/pub?gid=324242716&single=true&output=csv';
var CSV_URL = CSV_BASE + '&t=' + Date.now();

function getParam(name) {
  var url = new URLSearchParams(window.location.search);
  return url.get(name);
}

function parseCSV(text) {
  var lines = text.split('\n');
  var headers = [];
  var rows = [];
  var headerFound = false;
  for (var i = 0; i < lines.length; i++) {
    var cols = splitCSVLine(lines[i]);
    if (!headerFound) {
      // Cherche la ligne d'en-têtes (celle qui contient "ID Commande")
      if (cols.some(function(c){ return c.trim() === 'ID Commande'; })) {
        headers = cols.map(function(c){ return c.trim(); });
        headerFound = true;
      }
      continue;
    }
    if (cols.length > 1) {
      var row = {};
      for (var j = 0; j < headers.length; j++) {
        row[headers[j]] = (cols[j] || '').trim();
      }
      rows.push(row);
    }
  }
  return rows;
}

function splitCSVLine(line) {
  var result = [];
  var cur = '';
  var inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQuotes = !inQuotes; }
    else if (c === ',' && !inQuotes) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function getStatutClass(statut) {
  if (!statut) return '';
  var s = statut.toLowerCase();
  if (s.includes('préparer') || s.includes('preparer')) return 'preparer';
  if (s.includes('cours')) return 'cours';
  if (s.includes('envoy')) return 'envoye';
  return 'preparer';
}

function renderOrder(order) {
  var statut = order['Statut'] || '—';
  var produits = (order['Produit'] || '').split('\n').filter(function(p){ return p.trim(); });
  var quantites = (order['Quantité'] || '').split('\n');

  var produitsHTML = '';
  if (produits.length > 0) {
    produits.forEach(function(p, i) {
      var q = quantites[i] ? quantites[i].trim() : '';
      var clean = p.replace(/^•\s*/, '');
      produitsHTML += '<div class="produit-item"><div class="produit-name">' + clean + (q ? ' <strong>' + q + '</strong>' : '') + '</div></div>';
    });
  } else {
    produitsHTML = '<div class="produit-item">' + (order['Produit'] || '—') + '</div>';
  }

  var html = '';

  // Badge ID + Statut
  html += '<div class="order-badge">';
  html += '<div><div class="order-badge-label">Commande</div><div class="order-badge-id">' + (order['ID Commande'] || '—') + '</div></div>';
  html += '<span class="statut-pill ' + getStatutClass(statut) + '">' + statut + '</span>';
  html += '</div>';

  // Infos client
  html += '<div class="info-card">';
  html += '<div class="info-row"><div class="info-icon">👤</div><div class="info-content"><div class="info-label">Nom Client</div><div class="info-value">' + (order['Nom Client'] || '—') + '</div></div></div>';
  html += '<div class="info-row"><div class="info-icon">✉️</div><div class="info-content"><div class="info-label">Email</div><div class="info-value">' + (order['Email'] || '—') + '</div></div></div>';
  html += '<div class="info-row"><div class="info-icon">📍</div><div class="info-content"><div class="info-label">Adresse</div><div class="info-value">' + (order['Adresse'] || '—') + '</div></div></div>';
  html += '<div class="info-row"><div class="info-icon">🏪</div><div class="info-content"><div class="info-label">Point Relais</div><div class="info-value">' + (order['Point Relais'] || '—') + '</div></div></div>';
  html += '<div class="info-row"><div class="info-icon">⚖️</div><div class="info-content"><div class="info-label">Poids</div><div class="info-value">' + (order['Poids'] || '—') + '</div></div></div>';
  html += '</div>';

  // Produits
  html += '<div class="info-card">';
  html += '<div class="info-row"><div class="info-icon">🛍️</div><div class="info-content"><div class="info-label">Produits commandés</div>' + produitsHTML + '</div></div>';
  html += '</div>';

  // Suivi
  if (order['N° Suivi']) {
    html += '<div class="info-card">';
    html += '<div class="info-row"><div class="info-icon">📦</div><div class="info-content"><div class="info-label">N° Suivi</div><div class="info-value">' + order['N° Suivi'] + '</div></div></div>';
    html += '</div>';
  }

  // Notes
  if (order['Notes']) {
    html += '<div class="info-card">';
    html += '<div class="info-row"><div class="info-icon">📝</div><div class="info-content"><div class="info-label">Notes</div><div class="info-value">' + order['Notes'] + '</div></div></div>';
    html += '</div>';
  }

  document.getElementById('result').innerHTML = html;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').textContent = msg || 'Commande introuvable.';
  document.getElementById('error').style.display = 'block';
}

// Main
var commandeId = getParam('commande');
if (!commandeId) {
  showError('Aucun identifiant de commande dans l\'URL. Scannez un QR code valide.');
} else {
  fetch(CSV_URL)
    .then(function(r){ return r.text(); })
    .then(function(text){
      var rows = parseCSV(text);
      var found = null;
      for (var i = 0; i < rows.length; i++) {
        if (rows[i]['ID Commande'] === commandeId) { found = rows[i]; break; }
      }
      if (found) {
        renderOrder(found);
      } else {
        showError('Commande "' + commandeId + '" introuvable dans la base de données.');
      }
    })
    .catch(function(e){
      showError('Erreur de connexion. Vérifiez votre connexion internet.');
    });
}
</script>

</body>
</html>
